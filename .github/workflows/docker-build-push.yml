name: Build and Push Docker Image

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image name
        id: image
        run: echo "IMAGE_NAME=34v0wphix/${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Extract tag version
        id: tag-version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set default version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "TAG=${{ steps.tag-version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
            DATE=$(date +'%Y%m%d')
            echo "TAG=${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.IMAGE_NAME }}:latest
            ${{ steps.image.outputs.IMAGE_NAME }}:${{ steps.version.outputs.TAG }}

      - name: Output image information
        run: |
          echo "Multi-arch image has been pushed to ${{ steps.image.outputs.IMAGE_NAME }}:latest"
          echo "Multi-arch image has been pushed to ${{ steps.image.outputs.IMAGE_NAME }}:${{ steps.version.outputs.TAG }}"
          echo "Architectures: linux/amd64, linux/arm64"
